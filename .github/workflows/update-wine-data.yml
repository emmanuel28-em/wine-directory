name: Update wine data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-wine-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Update wine data from CSV
        run: node scripts/update-wine-data.mjs
        env:
          WINE_CSV_URL: ${{ secrets.WINE_CSV_URL }}
          ALLOW_WINE_IMPORT: ${{ vars.ALLOW_WINE_IMPORT }}

      - name: Commit updates
        run: |
          if git diff --quiet data.js; then
            echo "No wine data changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data.js
            git commit -m "Update wine data"
            git push
          fi
