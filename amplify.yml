version: 1
applications:
  - appRoot: saas-mvp
    backend:
      phases:
        build:
          commands:
            - npm ci --legacy-peer-deps --no-audit --no-fund
            - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
    frontend:
      phases:
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
